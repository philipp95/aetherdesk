name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging
      - feature/**

jobs:
  django:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: aetherdesk_test
          POSTGRES_USER: aetherdesk
          POSTGRES_PASSWORD: aetherdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      DEBUG: "False"
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgres://aetherdesk:aetherdesk@localhost:5432/aetherdesk_test
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      USE_CLOUDFLARE_R2: "False"
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks
        run: |
          python manage.py check
          python manage.py check --deploy --fail-level ERROR

      - name: Check migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test

      - name: Collect static
        run: python manage.py collectstatic --noinput
